<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aviva Partner Network — Monthly Newsletter</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --teal:      #1a5f6e;
    --teal-dark: #0f3d49;
    --teal-lt:   #2a7a8c;
    --gold:      #c8933a;
    --gold-lt:   #e8b86d;
    --cream:     #f5f0eb;
    --cream-dk:  #ede5db;
    --gray:      #8a7f74;
    --charcoal:  #2c2c2c;
    --red:       #c0392b;
    --green:     #27ae60;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:#1a1a1a;color:var(--charcoal);min-height:100vh;}

  /* ── EDITOR ── */
  #editor{background:#1a1a1a;padding:24px;min-height:100vh;}
  .ed-header{text-align:center;margin-bottom:28px;padding:28px 32px;background:linear-gradient(135deg,var(--teal-dark),var(--teal));border-radius:12px;color:#fff;}
  .ed-header h1{font-family:'Playfair Display',serif;font-size:26px;margin-bottom:6px;}
  .ed-header p{opacity:.7;font-size:13px;}
  .ed-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:18px;}
  .ed-box{background:#252525;border-radius:10px;padding:22px;border:1px solid #333;}
  .ed-box.full{grid-column:1/-1;}
  .ed-box h3{color:var(--gold);font-family:'Playfair Display',serif;font-size:15px;margin-bottom:16px;padding-bottom:9px;border-bottom:1px solid #333;}
  .row{display:grid;gap:11px;margin-bottom:11px;}
  .row.r2{grid-template-columns:1fr 1fr;}
  .row.r3{grid-template-columns:1fr 1fr 1fr;}
  .row.r4{grid-template-columns:1fr 1fr 1fr 1fr;}
  .fg{display:flex;flex-direction:column;gap:4px;margin-bottom:10px;}
  .fg label{font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:#777;}
  .fg input,.fg textarea,.fg select{background:#111;border:1px solid #444;border-radius:6px;padding:8px 11px;color:#e0e0e0;font-family:'DM Sans',sans-serif;font-size:13px;outline:none;transition:border-color .2s;}
  .fg input:focus,.fg textarea:focus,.fg select:focus{border-color:var(--teal-lt);}
  .fg textarea{resize:vertical;min-height:76px;line-height:1.5;}

  /* status bar */
  .status-bar{background:#111;border:1px solid #444;border-radius:8px;padding:11px 14px;margin-bottom:14px;}
  .status-bar-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:0;}
  .status-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#555;}
  #sheet-status{font-size:12px;color:#f0a070;font-weight:500;}
  .btn-refresh{background:#333;border:none;color:#777;padding:4px 11px;border-radius:5px;cursor:pointer;font-family:inherit;font-size:11px;}
  .btn-refresh:hover{background:#444;color:#bbb;}

  /* partner rows */
  .ph,.pr{display:grid;grid-template-columns:1.6fr 1fr 1fr 1fr 1fr 26px;gap:7px;margin-bottom:6px;align-items:center;}
  .ph span{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:#555;padding:0 2px;}
  .pr input{background:#111;border:1px solid #444;border-radius:5px;padding:7px 9px;color:#e0e0e0;font-family:'DM Sans',sans-serif;font-size:12px;outline:none;width:100%;}
  .pr input:focus{border-color:var(--teal-lt);}
  .btn-rm{background:#2a2a2a;border:none;color:#666;width:24px;height:24px;border-radius:4px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;}
  .btn-rm:hover{background:#3a1a1a;color:#c0392b;}
  .btn-add{width:100%;background:transparent;border:1px dashed #444;color:#555;padding:7px;border-radius:6px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:12px;margin-top:7px;}
  .btn-add:hover{border-color:var(--teal-lt);color:var(--teal-lt);}

  /* action bar */
  .action-bar{display:flex;gap:12px;justify-content:center;padding:22px 0;}
  .btn-preview{background:var(--teal);color:#fff;border:none;padding:13px 34px;border-radius:8px;font-family:'DM Sans',sans-serif;font-weight:600;font-size:14px;cursor:pointer;}
  .btn-preview:hover{background:var(--teal-lt);}
  .btn-pdf{background:var(--gold);color:#fff;border:none;padding:13px 34px;border-radius:8px;font-family:'DM Sans',sans-serif;font-weight:600;font-size:14px;cursor:pointer;}
  .btn-pdf:hover{background:var(--gold-lt);}

  /* ── PREVIEW ── */
  #preview{display:none;background:#111;padding:22px;}
  #preview-bar{display:flex;gap:10px;justify-content:center;margin-bottom:22px;position:sticky;top:0;background:#111;padding:14px 0;z-index:100;border-bottom:1px solid #222;}
  .btn-back{background:#333;color:#aaa;border:none;padding:10px 22px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;}
  .btn-back:hover{background:#444;color:#fff;}

  /* ── NEWSLETTER ── */
  #newsletter{max-width:850px;margin:0 auto;background:#fff;box-shadow:0 20px 80px rgba(0,0,0,.5);border-radius:4px;overflow:hidden;}

  .nl-top-bar{height:5px;background:var(--gold);}
  .nl-header{background:var(--teal-dark);padding:34px 50px 30px;}
  .nl-header-inner{display:flex;align-items:center;justify-content:space-between;}
  .nl-brand h2{font-family:'Playfair Display',serif;color:#fff;font-size:25px;font-weight:700;line-height:1.1;}
  .nl-brand h2 span{color:var(--gold-lt);}
  .nl-brand p{color:rgba(255,255,255,.5);font-size:10.5px;text-transform:uppercase;letter-spacing:2px;margin-top:4px;font-weight:500;}
  .nl-period-badge{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);color:#fff;padding:9px 18px;border-radius:4px;font-size:13px;font-weight:600;letter-spacing:1px;text-transform:uppercase;display:block;margin-bottom:6px;text-align:center;}
  .nl-issue{color:rgba(255,255,255,.35);font-size:10.5px;text-align:center;letter-spacing:1px;display:block;}
  .nl-accent-bar{height:3px;background:linear-gradient(to right,var(--gold),var(--teal-lt),var(--gold));margin-top:0;}

  .nl-intro{padding:38px 50px;background:#fff;border-bottom:1px solid var(--cream-dk);}
  .nl-intro-inner{display:flex;gap:26px;align-items:flex-start;}
  .nl-avatar{width:68px;height:68px;border-radius:50%;background:var(--teal);flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff;font-family:'Playfair Display',serif;font-size:24px;font-weight:700;border:3px solid var(--gold);}
  .nl-intro h4{font-family:'Playfair Display',serif;font-size:19px;color:var(--teal-dark);margin-bottom:9px;}
  .nl-intro p{color:#555;font-size:13px;line-height:1.72;font-weight:300;}
  .nl-sig{margin-top:13px;}
  .nl-sig strong{color:var(--charcoal);font-size:13px;font-weight:600;display:block;}
  .nl-sig span{color:var(--gray);font-size:11px;text-transform:uppercase;letter-spacing:1px;}

  .nl-highlights{background:var(--teal-dark);padding:0;display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background-color:rgba(255,255,255,.08);}
  .nl-hl-item{background:var(--teal-dark);padding:22px 18px;text-align:center;}
  .nl-hl-label{color:rgba(255,255,255,.5);font-size:9.5px;text-transform:uppercase;letter-spacing:1.5px;font-weight:600;margin-bottom:7px;}
  .nl-hl-value{color:#fff;font-family:'Playfair Display',serif;font-size:27px;font-weight:700;line-height:1;margin-bottom:4px;}
  .nl-hl-value.gold{color:var(--gold-lt);}
  .nl-hl-change{font-size:11px;font-weight:600;padding:2px 8px;border-radius:10px;display:inline-block;}
  .nl-hl-change.up{color:#7ecba1;background:rgba(126,203,161,.15);}
  .nl-hl-change.down{color:#f08080;background:rgba(240,128,128,.15);}
  .nl-hl-change.neutral{color:rgba(255,255,255,.4);}

  .nl-section{padding:34px 50px;}
  .nl-section+.nl-section{border-top:1px solid var(--cream-dk);}
  .nl-section-title{font-family:'Playfair Display',serif;font-size:21px;color:var(--teal-dark);margin-bottom:5px;display:flex;align-items:center;gap:12px;}
  .nl-section-title::after{content:'';flex:1;height:1px;background:linear-gradient(to right,rgba(15,61,73,.3),transparent);}
  .nl-section-sub{color:var(--gray);font-size:11px;text-transform:uppercase;letter-spacing:1.5px;font-weight:600;margin-bottom:22px;}

  .nl-kpi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:13px;}
  .nl-kpi-card{background:#fff;border-radius:8px;padding:17px 19px;border:1px solid var(--cream-dk);position:relative;overflow:hidden;}
  .nl-kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--teal);}
  .nl-kpi-card.warn::before{background:var(--gold);}
  .nl-kpi-card.bad::before{background:var(--red);}
  .nl-kpi-name{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--gray);font-weight:600;margin-bottom:7px;}
  .nl-kpi-val{font-family:'Playfair Display',serif;font-size:23px;color:var(--teal-dark);font-weight:700;line-height:1.1;}
  .nl-kpi-target{font-size:11px;color:var(--gray);margin-top:3px;}
  .nl-kpi-badge{display:inline-flex;align-items:center;gap:4px;margin-top:6px;font-size:11px;font-weight:600;padding:3px 8px;border-radius:10px;}
  .nl-kpi-badge.on{background:#e8f7ef;color:var(--green);}
  .nl-kpi-badge.near{background:#fef5e4;color:var(--gold);}
  .nl-kpi-badge.off{background:#fdecea;color:var(--red);}

  .nl-table{width:100%;border-collapse:collapse;font-size:12.5px;}
  .nl-table th{background:var(--teal-dark);color:rgba(255,255,255,.72);font-size:9.5px;text-transform:uppercase;letter-spacing:1px;font-weight:600;padding:10px 13px;text-align:left;}
  .nl-table td{padding:11px 13px;border-bottom:1px solid var(--cream-dk);color:var(--charcoal);}
  .nl-table tr:nth-child(even) td{background:rgba(245,240,235,.5);}
  .nl-table tr:last-child td{border-bottom:none;}
  .nl-table .pname{font-weight:600;color:var(--teal-dark);}

  .nl-divider{height:2px;background:linear-gradient(to right,transparent,var(--gold),transparent);margin:0 50px;}

  .nl-notes{background:var(--cream-dk);padding:30px 50px;border-top:3px solid var(--teal);}
  .nl-notes h3{font-family:'Playfair Display',serif;font-size:17px;color:var(--teal-dark);margin-bottom:13px;}
  .nl-notes ul{list-style:none;padding:0;}
  .nl-notes li{padding:8px 0 8px 20px;position:relative;border-bottom:1px solid rgba(0,0,0,.06);font-size:13px;color:#555;line-height:1.6;}
  .nl-notes li::before{content:'›';position:absolute;left:4px;color:var(--gold);font-weight:700;font-size:16px;line-height:1.3;}

  .nl-footer{background:var(--charcoal);padding:22px 50px;display:flex;align-items:center;justify-content:space-between;}
  .nl-footer-brand{font-family:'Playfair Display',serif;color:#fff;font-size:14px;font-weight:600;}
  .nl-footer-brand span{color:var(--gold-lt);}
  .nl-footer-info{color:rgba(255,255,255,.3);font-size:11px;text-align:right;line-height:1.6;}
  .nl-footer-bar{height:4px;background:linear-gradient(to right,var(--teal),var(--gold),var(--teal));}

  @media print{
    body{background:#fff;}
    #editor{display:none!important;}
    #preview{display:block!important;background:#fff;padding:0;}
    #preview-bar{display:none!important;}
    #newsletter{box-shadow:none;max-width:100%;}
  }
  ::-webkit-scrollbar{width:5px;}
  ::-webkit-scrollbar-track{background:#111;}
  ::-webkit-scrollbar-thumb{background:#333;border-radius:3px;}
</style>
</head>
<body>

<!-- ═══════════════════ EDITOR ═══════════════════ -->
<div id="editor">
  <div class="ed-header">
    <h1>Aviva Partner Network — Monthly Newsletter</h1>
    <p>Data loads automatically from the scorecard. Review, tweak, then preview or download.</p>
  </div>

  <div class="ed-grid">

    <!-- Header / connection -->
    <div class="ed-box">
      <h3>Newsletter Header <span id="sheet-status" style="font-size:11px;font-weight:400;color:#f0a070;margin-left:8px;">Connecting...</span></h3>

      <div class="row r2">
        <div class="fg">
          <label>Reporting Month</label>
          <div style="display:flex;gap:6px;align-items:center;">
            <button onclick="stepMonth(-1)" style="background:#333;border:none;color:#aaa;width:34px;height:36px;border-radius:6px;cursor:pointer;font-size:18px;flex-shrink:0;line-height:1;">‹</button>
            <select id="month-select" onchange="applyMonth()" style="background:#111;border:1px solid #444;border-radius:6px;padding:8px 11px;color:#e0e0e0;font-family:'DM Sans',sans-serif;font-size:13px;outline:none;flex:1;">
              <option>Loading...</option>
            </select>
            <button onclick="stepMonth(1)" style="background:#333;border:none;color:#aaa;width:34px;height:36px;border-radius:6px;cursor:pointer;font-size:18px;flex-shrink:0;line-height:1;">›</button>
            <button onclick="loadSheetData()" title="Refresh from scorecard" style="background:#333;border:none;color:#777;width:34px;height:36px;border-radius:6px;cursor:pointer;font-size:14px;flex-shrink:0;">↻</button>
          </div>
          <input type="hidden" id="month" value="">
        </div>
        <div class="fg">
          <label>Issue Number</label>
          <input type="text" id="issue" value="Issue 01">
        </div>
      </div>
      <div class="row r2">
        <div class="fg">
          <label>Author Name</label>
          <input type="text" id="author-name" value="Nathalie Futrell">
        </div>
        <div class="fg">
          <label>Author Title</label>
          <input type="text" id="author-title" value="VP of Operations">
        </div>
      </div>
      <div class="fg">
        <label>Author Initials</label>
        <input type="text" id="author-initial" value="NF" maxlength="2">
      </div>
    </div>

    <!-- Intro -->
    <div class="ed-box">
      <h3>Intro Message</h3>
      <div class="fg">
        <label>Opening note</label>
        <textarea id="intro-message" rows="9">Hey partners,

Another strong month across the network. I'm proud to share our performance data and a few key updates. Let's keep building on this momentum together.</textarea>
      </div>
    </div>

    <!-- Financial highlights -->
    <div class="ed-box full">
      <h3>Network Financial Highlights</h3>
      <div class="row r3">
        <div class="fg"><label>Total Network Revenue</label><input type="text" id="total-revenue" value=""></div>
        <div class="fg"><label>Revenue vs Last Month</label><input type="text" id="revenue-change" placeholder="+0.0%"></div>
        <div class="fg"><label>Active Partners</label><input type="text" id="active-partners" value=""></div>
      </div>
      <div class="row r4">
        <div class="fg"><label>Avg Rebooking Rate</label><input type="text" id="avg-rebooking" value=""></div>
        <div class="fg"><label>Avg Provider Utilization</label><input type="text" id="avg-util" value=""></div>
        <div class="fg"><label>Avg New Patients / Mo</label><input type="text" id="avg-new-patients" value=""></div>
        <div class="fg"><label>Avg YOY Appt Growth</label><input type="text" id="avg-yoy" value=""></div>
      </div>
    </div>

    <!-- KPI summary -->
    <div class="ed-box full">
      <h3>Network KPI Summary</h3>
      <div class="row r3">
        <div class="fg"><label>Avg Consult to Tx Rate</label><input type="text" id="kpi-consult" value=""></div>
        <div class="fg"><label>Avg Rev/Visit (Med)</label><input type="text" id="kpi-rev-med" value=""></div>
        <div class="fg"><label>Avg Rev/Visit (Esth.)</label><input type="text" id="kpi-rev-esth" value=""></div>
        <div class="fg"><label>Avg Product Sales %</label><input type="text" id="kpi-products" value=""></div>
        <div class="fg"><label>Avg COGs %</label><input type="text" id="kpi-cogs" value=""></div>
        <div class="fg"><label>Avg Payroll %</label><input type="text" id="kpi-payroll" value=""></div>
      </div>
    </div>

    <!-- Partner table -->
    <div class="ed-box full">
      <h3>Partner Spotlight</h3>
      <div id="partners-list"></div>
      <button class="btn-add" onclick="addPartner()">+ Add Partner</button>
    </div>

    <!-- Notes -->
    <div class="ed-box full">
      <h3>Notes, Action Items &amp; Announcements</h3>
      <div class="fg">
        <label>One item per line — each becomes a bullet point</label>
        <textarea id="notes-text" rows="7" placeholder="Enter notes here, one per line..."></textarea>
      </div>
    </div>

  </div>

  <div class="action-bar">
    <button class="btn-preview" onclick="showPreview()">Preview Newsletter</button>
    <button class="btn-pdf" onclick="downloadPDF()">Download PDF</button>
  </div>
</div>

<!-- ═══════════════════ PREVIEW ═══════════════════ -->
<div id="preview">
  <div id="preview-bar">
    <button class="btn-back" onclick="backToEditor()">← Back to Editor</button>
    <button class="btn-preview" onclick="showPreview()">Refresh</button>
    <button class="btn-pdf" onclick="downloadPDF()">Download PDF</button>
  </div>
  <div id="newsletter"></div>
</div>

<script>
// ── Config ────────────────────────────────────────────────────────────
const SHEET_ID  = "1-pixu1e2mUvWQjb6ovMpvAz_48OkHOwk2lPBEeIy_OY";
// gviz works from a hosted origin (GitHub Pages). Will NOT work from file://
const DATA_URL  = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=0`;

// Header labels in the sheet → field names
const HEADER_MAP = {
  "Practice Name":              "partner",
  "Reporting Period":           "period",
  "Total Net Revenue":          "revenue",
  "Provider Utilization %":     "util",
  "Consult to Treatment %":     "consult",
  "Rev Per Visit Medical":      "revMed",
  "Rev Per Visit Aesthetic":    "revEsth",
  "Product Sales %":            "products",
  "Rebooking Rate %":           "rebooking",
  "New Patient Acquisition":    "newPts",
  "Member Generated Revenue %": "memberRev",
  "COGs %":                     "cogs",
  "Payroll %":                  "payroll",
  "Net Income/EBITDA %":        "netIncome",
  "YOY Appt Growth %":          "yoyGrowth",
};

// ── State ─────────────────────────────────────────────────────────────
let allRows        = [];
let availMonths    = []; // [{key, label}] newest first

// ── Helpers ───────────────────────────────────────────────────────────
const $  = id => document.getElementById(id);
const fmtMoney = v => { const n=parseFloat(v); return isNaN(n)?"":"$"+Math.round(n).toLocaleString("en-US"); };
const fmtPct   = v => { const n=parseFloat(v); return isNaN(n)?"":Math.round(n)+"%"; };
const gv       = id => ($( id)||{}).value||"";

function setStatus(msg, ok) {
  const el = $("sheet-status");
  if (!el) return;
  el.textContent = msg;
  el.style.color = ok ? "#7ecba1" : "#f0a070";
}

// Parse period value from gviz → {key, label}
// Handles: "Date(2026,1,1)", Excel serial (46054), "2/1/2026", "2026-02-01"
function parseGvizDate(raw) {
  if (!raw && raw !== 0) return null;
  const s = String(raw);

  // Format 1: gviz Date(Y,M,D) — M is 0-based
  const dm = s.match(/Date\((\d+),(\d+)/);
  if (dm) {
    const year=+dm[1], mo=+dm[2];
    return { key: year*100+mo, label: new Date(year,mo,1).toLocaleString("en-US",{month:"long",year:"numeric"}) };
  }

  // Format 2: Excel serial number (number between 40000–50000 = years 2009–2036)
  const num = parseFloat(s);
  if (!isNaN(num) && num > 40000 && num < 60000) {
    // Excel epoch: Dec 30 1899. Add serial days.
    const d = new Date(1899, 11, 30 + Math.round(num));
    const key = d.getFullYear()*100 + d.getMonth();
    return { key, label: d.toLocaleString("en-US",{month:"long",year:"numeric"}) };
  }

  // Format 3: readable date string like "2/1/2026" or "2026-02-01"
  if (s.includes("/") || s.includes("-")) {
    const d = new Date(s);
    if (!isNaN(d)) {
      const key = d.getFullYear()*100 + d.getMonth();
      return { key, label: d.toLocaleString("en-US",{month:"long",year:"numeric"}) };
    }
  }

  return null;
}

const ALL_MONTHS = [
  "January","February","March","April","May","June",
  "July","August","September","October","November","December"
];

function stepMonth(dir) {
  const sel = $("month-select");
  const idx = sel.selectedIndex + dir;
  if (idx >= 0 && idx < sel.options.length) {
    sel.selectedIndex = idx;
    applyMonth();
  } else {
    // Step beyond sheet data — add a synthetic month option
    const cur = $("month").value;
    const parts = cur.split(" ");
    let mIdx = ALL_MONTHS.indexOf(parts[0]);
    let year  = parseInt(parts[1]) || new Date().getFullYear();
    mIdx += dir;
    if (mIdx > 11) { mIdx = 0; year++; }
    if (mIdx < 0)  { mIdx = 11; year--; }
    const label = ALL_MONTHS[mIdx] + " " + year;
    const key   = year * 100 + mIdx;
    // Add option if not already present
    let found = false;
    for (const o of sel.options) { if (parseInt(o.value) === key) { o.selected=true; found=true; break; } }
    if (!found) {
      const o = document.createElement("option");
      o.value = key; o.textContent = label;
      dir < 0 ? sel.insertBefore(o, sel.options[0]) : sel.appendChild(o);
      o.selected = true;
      availMonths.push({key, label});
    }
    $("month").value = label;
    // Clear partner list and fields for manual entry
    $("partners-list").innerHTML = "";
    $("active-partners").value = "";
    $("total-revenue").value = "";
    $("avg-rebooking").value = ""; $("avg-util").value = "";
    $("avg-new-patients").value = ""; $("avg-yoy").value = "";
    $("kpi-consult").value = ""; $("kpi-rev-med").value = "";
    $("kpi-rev-esth").value = ""; $("kpi-products").value = "";
    $("kpi-cogs").value = ""; $("kpi-payroll").value = "";

}

// ── Load data from gviz ───────────────────────────────────────────────
async function loadSheetData() {
  setStatus("Connecting...", false);
  try {
    const res  = await fetch(DATA_URL);
    if (!res.ok) throw new Error("HTTP "+res.status);
    const raw  = await res.text();
    // Strip JSONP wrapper: /*O_o*/\ngoogle.visualization.Query.setResponse({...});
    const json = JSON.parse(raw.replace(/^[^\{]*/, "").replace(/\s*\);\s*$/, ""));

    const cols = json.table.cols;
    const rows = json.table.rows;

    // col label → index
    const ci = {};
    cols.forEach((c,i) => { if(c.label) ci[c.label.trim()] = i; });

    // field name → col index
    const fi = {};
    for (const [lbl,fld] of Object.entries(HEADER_MAP)) {
      if (ci[lbl] !== undefined) fi[fld] = ci[lbl];
    }

    const cell = (row, fld) => {
      const i = fi[fld]; if (i===undefined) return null;
      const c = row.c[i]; if (!c) return null;
      if (c.v !== null && c.v !== undefined) return c.v;
      // Fallback to formatted string (useful for date columns)
      if (c.f !== null && c.f !== undefined) return c.f;
      return null;
    };

    // Also extract raw formatted value for period specifically
    const cellF = (row, fld) => {
      const i = fi[fld]; if (i===undefined) return null;
      const c = row.c[i]; if (!c) return null;
      return c.f || c.v || null;
    };

    allRows = [];
    for (const row of rows) {
      if (!row||!row.c) continue;
      const partner = String(cell(row,"partner")||"").trim();
      if (!partner) continue;
      const periodRaw = cell(row,"period");
      const periodFmt = cellF(row,"period");
      // Try raw first, then formatted string fallback
      const pd = parseGvizDate(periodRaw) || parseGvizDate(periodFmt);
      if (!pd) continue;

      const n = fld => { const v=cell(row,fld); return (v===null||v===undefined||v==="")? null : parseFloat(v); };
      allRows.push({
        partner, periodKey:pd.key, periodLabel:pd.label,
        revenue:n("revenue"), util:n("util"), consult:n("consult"),
        revMed:n("revMed"), revEsth:n("revEsth"), products:n("products"),
        rebooking:n("rebooking"), newPts:n("newPts"), memberRev:n("memberRev"),
        cogs:n("cogs"), payroll:n("payroll"), netIncome:n("netIncome"), yoyGrowth:n("yoyGrowth"),
      });
    }

    // Build month list
    const seen = new Set();
    availMonths = [];
    for (const r of allRows) {
      if (!seen.has(r.periodKey)) {
        seen.add(r.periodKey);
        availMonths.push({key:r.periodKey, label:r.periodLabel});
      }
    }
    availMonths.sort((a,b)=>b.key-a.key);

    // Populate dropdown
    const sel = $("month-select");
    sel.innerHTML = "";
    availMonths.forEach(m => {
      const o = document.createElement("option");
      o.value = m.key; o.textContent = m.label; sel.appendChild(o);
    });

    setStatus("Loaded ✓ — "+allRows.length+" submissions", true);
    applyMonth();

  } catch(e) {
    console.error(e);
    setStatus("Load failed: "+e.message+" — are you viewing from GitHub Pages?", false);
    loadFallback();
  }
}

// ── Apply selected month → fill all fields ────────────────────────────
function applyMonth() {
  const sel = $("month-select");
  if (!sel || availMonths.length===0) return;
  const key = parseInt(sel.value);
  const mo  = availMonths.find(m=>m.key===key);
  $("month").value = mo ? mo.label : "";

  // Rows for this period, deduplicated by partner (first row wins)
  const pm = new Map();
  for (const r of allRows) {
    if (r.periodKey===key && !pm.has(r.partner)) pm.set(r.partner, r);
  }

  // Active partners
  $("active-partners").value = pm.size;

  // Partner rows — name only, preserve any existing notes
  const existingNotes = {};
  document.querySelectorAll("#partners-list .pr").forEach(r => {
    const n = r.querySelector('[data-f="name"]').value;
    const t = r.querySelector('[data-f="notes"]').value;
    if (n) existingNotes[n] = t;
  });
  $("partners-list").innerHTML = "";
  for (const [name] of pm) {
    addPartner({ name, notes: existingNotes[name]||"" });
  }

  // Averages
  const vals = [...pm.values()];
  const avg = (fld, pct) => {
    const ns = vals.map(r=>r[fld]).filter(v=>v!==null&&!isNaN(v));
    if (!ns.length) return "";
    const a = ns.reduce((s,v)=>s+v,0)/ns.length;
    return pct ? Math.round(a)+"%" : String(Math.round(a));
  };
  const sumFld = fld => {
    const ns = vals.map(r=>r[fld]).filter(v=>v!==null&&!isNaN(v));
    return ns.length ? ns.reduce((s,v)=>s+v,0) : null;
  };
  const sf = (id,v) => { if(v) $(id).value=v; };

  const tot = sumFld("revenue");
  if (tot!==null) $("total-revenue").value = fmtMoney(tot);

  // Auto-calculate revenue vs previous month
  const sortedKeys = availMonths.map(m=>m.key).sort((a,b)=>b-a);
  const curIdx = sortedKeys.indexOf(key);
  if (curIdx !== -1 && curIdx < sortedKeys.length - 1) {
    const prevKey = sortedKeys[curIdx + 1];
    const prevPm = new Map();
    for (const r of allRows) {
      if (r.periodKey===prevKey && !prevPm.has(r.partner)) prevPm.set(r.partner, r);
    }
    const prevVals = [...prevPm.values()];
    const prevNs = prevVals.map(r=>r.revenue).filter(v=>v!==null&&!isNaN(v));
    const prevTot = prevNs.length ? prevNs.reduce((s,v)=>s+v,0) : null;
    if (tot !== null && prevTot !== null && prevTot !== 0) {
      const pct = ((tot - prevTot) / prevTot) * 100;
      const sign = pct >= 0 ? "+" : "";
      $("revenue-change").value = sign + pct.toFixed(1) + "%";
    }
  }

  sf("avg-rebooking",    avg("rebooking",true));
  sf("avg-util",         avg("util",true));
  sf("avg-new-patients", avg("newPts",false));
  sf("avg-yoy",          avg("yoyGrowth",true));
  sf("kpi-consult",      avg("consult",true));
  sf("kpi-products",     avg("products",true));
  sf("kpi-cogs",         avg("cogs",true));
  sf("kpi-payroll",      avg("payroll",true));

  const rm = avg("revMed",false);  if(rm)  $("kpi-rev-med").value  = "$"+rm;
  const re = avg("revEsth",false); if(re)  $("kpi-rev-esth").value = "$"+re;
}

// ── KPI badge ─────────────────────────────────────────────────────────
function kpiBadge(val, tgtStr, hi) {
  const v=parseFloat(String(val).replace(/[^0-9.\-]/g,"")),
        t=parseFloat(String(tgtStr).replace(/[^0-9.\-]/g,""));
  if(isNaN(v)||isNaN(t)) return "";
  const ok   = hi ? v>=t : v<=t;
  const near = hi ? v>=t*.9 : v<=t*1.1;
  if(ok)   return `<span class="nl-kpi-badge on">✓ On Target</span>`;
  if(near) return `<span class="nl-kpi-badge near">~ Near Target</span>`;
  return          `<span class="nl-kpi-badge off">! Below Target</span>`;
}

function changeClass(v) {
  return !v?"neutral":v.startsWith("+")?"up":v.startsWith("-")?"down":"neutral";
}

// ── Auto-save & restore ───────────────────────────────────────────────
const SAVE_FIELDS = ["issue","author-name","author-title","author-initial","intro-message",
  "revenue-change","partners-on-track","avg-rebooking","avg-util","avg-new-patients",
  "avg-yoy","kpi-consult","kpi-rev-med","kpi-rev-esth","kpi-products","kpi-cogs","kpi-payroll",
  "notes-text"];

function saveState() {
  const state = {};
  SAVE_FIELDS.forEach(id => { const el=$(id); if(el) state[id]=el.value; });
  // Save partner notes keyed by name
  const partnerNotes = {};
  document.querySelectorAll("#partners-list .pr").forEach(r => {
    const name = r.querySelector('[data-f="name"]')?.value;
    const notes = r.querySelector('[data-f="notes"]')?.value;
    if (name) partnerNotes[name] = notes||"";
  });
  state._partnerNotes = JSON.stringify(partnerNotes);
  state._month = gv("month");
  localStorage.setItem("aviva_newsletter", JSON.stringify(state));
}

function restoreState() {
  try {
    const raw = localStorage.getItem("aviva_newsletter");
    if (!raw) return;
    const state = JSON.parse(raw);
    SAVE_FIELDS.forEach(id => { const el=$(id); if(el && state[id]!==undefined) el.value=state[id]; });
    // Restore partner notes after partners are populated
    if (state._partnerNotes) {
      const notes = JSON.parse(state._partnerNotes);
      document.querySelectorAll("#partners-list .pr").forEach(r => {
        const name = r.querySelector('[data-f="name"]')?.value;
        const ta   = r.querySelector('[data-f="notes"]');
        if (name && notes[name] !== undefined && ta) ta.value = notes[name];
      });
    }
  } catch(e) { console.warn("Could not restore saved state", e); }
}

// Auto-save on any input change
document.addEventListener("input", saveState);

// ── Init ──────────────────────────────────────────────────────────────
window.addEventListener("DOMContentLoaded", async () => {
  await loadSheetData();
  restoreState(); // Restore saved notes/text on top of sheet data
});
